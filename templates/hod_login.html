<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOD Login | ULK Appeal System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f3460, #1a1a2e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    .card h1 { text-align: center; margin-bottom: 1.5rem; color: #0f3460; font-size: 1.5rem; }
    .card p { text-align: center; color: #e74c3c; margin-bottom: 1rem; font-size: 0.9rem; }
    label { display: block; margin-bottom: 0.3rem; color: #555; font-size: 0.9rem; }
    input { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    input:focus { outline: none; border-color: #0f3460; }
    button { width: 100%; padding: 0.75rem; background: #0f3460; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1a1a2e; }
    .footer { margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HOD Login</h1>
    {% if msg %}<p>{{ msg }}</p>{% endif %}
    <form method="post">
      <label for="username">Username</label>
      <input name="username" id="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" name="password" id="password" required>
      <button type="submit">Login</button>
    </form>
    <div class="footer"><a href="{{ url_for('admin_login') }}">Admin Login</a></div>
  </div>
</body>
</html>
