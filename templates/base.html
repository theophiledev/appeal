<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ULK Marks Appeal System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

        :root {
            --bg-primary: #080d1a;
            --bg-secondary: #0f1629;
            --bg-tertiary: #1a2340;
            --accent-teal: #00d4ff;
            --accent-amber: #f4a261;
            --accent-green: #06d6a0;
            --accent-red: #ef476f;
            --accent-purple: #7c3aed;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 214, 160, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .glass-card {
            background: rgba(15, 22, 41, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
        }

        .gradient-border {
            position: relative;
            background: var(--bg-secondary);
            border-radius: 1rem;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-purple));
            z-index: -1;
            opacity: 0.4;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.9), rgba(26, 35, 64, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-teal), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }
        .stat-card:hover::before { opacity: 1; }

        .table-container {
            background: rgba(15, 22, 41, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
        }

        .custom-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .custom-table th {
            background: rgba(26, 35, 64, 0.6);
            padding: 0.875rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .custom-table td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        .custom-table tbody tr {
            transition: background 0.15s;
        }
        .custom-table tbody tr:hover td {
            background: rgba(0, 212, 255, 0.03);
        }
        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-teal), #0096b4);
            color: #080d1a;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15));
            pointer-events: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 212, 255, 0.25);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(0, 212, 255, 0.4);
            color: var(--accent-teal);
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-teal);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid rgba(239, 71, 111, 0.4);
            color: var(--accent-red);
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-danger:hover {
            background: rgba(239, 71, 111, 0.1);
            border-color: var(--accent-red);
            box-shadow: 0 0 20px rgba(239, 71, 111, 0.1);
        }

        .btn-amber {
            background: transparent;
            border: 1px solid rgba(244, 162, 97, 0.4);
            color: var(--accent-amber);
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-amber:hover {
            background: rgba(244, 162, 97, 0.1);
            border-color: var(--accent-amber);
        }

        .input-field {
            background: rgba(26, 35, 64, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.7rem 1rem;
            border-radius: 0.5rem;
            width: 100%;
            transition: all 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08);
            background: rgba(26, 35, 64, 0.8);
        }
        .input-field::placeholder { color: var(--text-muted); }
        select.input-field { cursor: pointer; }
        select.input-field option { background: var(--bg-tertiary); color: var(--text-primary); }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            gap: 0.3rem;
        }
        .badge::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            display: inline-block;
        }
        .badge-teal { background: rgba(0, 212, 255, 0.1); color: var(--accent-teal); border: 1px solid rgba(0, 212, 255, 0.25); }
        .badge-teal::before { background: var(--accent-teal); }
        .badge-amber { background: rgba(244, 162, 97, 0.1); color: var(--accent-amber); border: 1px solid rgba(244, 162, 97, 0.25); }
        .badge-amber::before { background: var(--accent-amber); }
        .badge-green { background: rgba(6, 214, 160, 0.1); color: var(--accent-green); border: 1px solid rgba(6, 214, 160, 0.25); }
        .badge-green::before { background: var(--accent-green); }
        .badge-red { background: rgba(239, 71, 111, 0.1); color: var(--accent-red); border: 1px solid rgba(239, 71, 111, 0.25); }
        .badge-red::before { background: var(--accent-red); }
        .badge-purple { background: rgba(124, 58, 237, 0.1); color: var(--accent-purple); border: 1px solid rgba(124, 58, 237, 0.25); }
        .badge-purple::before { background: var(--accent-purple); }

        .flash-message {
            padding: 0.9rem 1.3rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .flash-success { background: rgba(6, 214, 160, 0.1); border: 1px solid rgba(6, 214, 160, 0.25); color: var(--accent-green); }
        .flash-danger { background: rgba(239, 71, 111, 0.1); border: 1px solid rgba(239, 71, 111, 0.25); color: var(--accent-red); }
        .flash-warning { background: rgba(244, 162, 97, 0.1); border: 1px solid rgba(244, 162, 97, 0.25); color: var(--accent-amber); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
        }

        .pagination {
            display: flex;
            gap: 0.35rem;
            align-items: center;
            justify-content: center;
            padding: 1rem 1rem 0.5rem;
            flex-wrap: wrap;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.25s;
        }
        .pagination a {
            color: var(--accent-teal);
            text-decoration: none;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.03);
        }
        .pagination a:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--accent-teal);
        }
        .pagination .active {
            background: linear-gradient(135deg, var(--accent-teal), #0096b4);
            color: #080d1a;
            border: none;
            font-weight: 700;
        }
        .pagination .disabled {
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: not-allowed;
            background: transparent;
        }

        .tab-nav {
            display: flex;
            gap: 0.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 1.75rem;
            overflow-x: auto;
            flex-wrap: nowrap;
            padding-bottom: 0;
        }
        .tab-nav a {
            padding: 0.7rem 1.3rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.25s;
            white-space: nowrap;
            text-decoration: none;
        }
        .tab-nav a:hover { color: var(--text-primary); }
        .tab-nav a.active {
            color: var(--accent-teal);
            border-bottom-color: var(--accent-teal);
            background: rgba(0, 212, 255, 0.04);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.9rem;
            border-radius: 0.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
            opacity: 0.4;
        }
        .empty-state p { font-size: 0.9rem; }
    </style>
</head>
<body class="antialiased">
    {% block content %}{% endblock %}
    
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
